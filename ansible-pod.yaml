---
# Production-grade Execution Environment pod for OpenShift
# Prefer running via AAP Controller with EE; use this only for ad-hoc debugging.
apiVersion: v1
kind: Pod
metadata:
  name: netapp-ansible-runner
  namespace: ansible-automation
  labels:
    app.kubernetes.io/name: netapp-ansible-runner
    app.kubernetes.io/component: automation
spec:
  serviceAccountName: ansible-runner
  securityContext:
    runAsUser: 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: ansible
      image: quay.io/ansible/creator-ee:latest
      command: ["/bin/sh", "-c", "sleep 3600"]
      env:
        - name: HOME
          value: "/tmp"
        - name: PATH
          value: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/tmp/.local/bin"
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 512Mi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: false
  restartPolicy: Never
  terminationGracePeriodSeconds: 30

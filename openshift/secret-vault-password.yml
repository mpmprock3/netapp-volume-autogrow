---
# Example Secret for Ansible Vault password
#
# Option A (recommended): Create via CLI instead of applying this file:
#   oc create secret generic netapp-vault-password \
#     --from-literal=password='YOUR_VAULT_PASSWORD'
#
# Option B: Base64-encode your password and replace the placeholder below:
#   echo -n 'YOUR_VAULT_PASSWORD' | base64
#   Then apply:  oc apply -f openshift/secret-vault-password.yml

apiVersion: v1
kind: Secret
metadata:
  name: netapp-vault-password
  namespace: ansible-automation
  labels:
    app.kubernetes.io/name: netapp-volume-autogrow
    app.kubernetes.io/component: automation
type: Opaque
data:
  password: Q0hBTkdFX01F
